<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitFamily PRO</title>
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons (Alternativa ao Lucide para HTML) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* Animações customizadas e utilitários */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(2rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInBottom { from { transform: translateY(2rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInTop { from { transform: translateY(-2rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slide-in-right { animation: slideInRight 0.5s ease-out forwards, fadeIn 0.5s ease-out forwards; }
        .animate-slide-in-bottom { animation: slideInBottom 0.5s ease-out forwards, fadeIn 0.5s ease-out forwards; }
        .animate-slide-in-top { animation: slideInTop 0.3s ease-out forwards, fadeIn 0.3s ease-out forwards; }
        
        /* Ocultar barra de rolagem mas manter funcionalidade */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans antialiased overflow-x-hidden selection:bg-lime-500 selection:text-gray-950">
    
    <!-- Container Principal do App -->
    <div id="app" class="min-h-screen flex flex-col relative pb-safe"></div>

    <script>
        // ==========================================
        // 1. BANCO DE DADOS E CONSTANTES
        // ==========================================
        const EXERCISE_IMAGES = {
            peito: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&w=150&q=80",
            costas: "https://images.unsplash.com/photo-1603287681836-b174ce5074c2?auto=format&fit=crop&w=150&q=80",
            perna: "https://images.unsplash.com/photo-1434596922112-19c563067271?auto=format&fit=crop&w=150&q=80",
            cardio: "https://images.unsplash.com/photo-1538805060514-97d9cc17730c?auto=format&fit=crop&w=150&q=80",
            core: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=150&q=80",
            braco: "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=150&q=80"
        };

        const ALL_EXERCISES = [
            { id: 'p1', name: 'Supino Reto na Máquina', muscle: 'Peito', img: EXERCISE_IMAGES.peito, defaultSets: 4, defaultReps: '10', defaultRest: 60 },
            { id: 'p2', name: 'Peck Deck (Voador)', muscle: 'Peito', img: EXERCISE_IMAGES.peito, defaultSets: 3, defaultReps: '12', defaultRest: 60 },
            { id: 'p3', name: 'Cross Over Polia Alta', muscle: 'Peito', img: EXERCISE_IMAGES.peito, defaultSets: 3, defaultReps: '15', defaultRest: 45 },
            { id: 'p4', name: 'Supino Inclinado c/ Halteres', muscle: 'Peito', img: EXERCISE_IMAGES.peito, defaultSets: 4, defaultReps: '10', defaultRest: 60 },
            { id: 'c1', name: 'Puxada Alta (Pulley)', muscle: 'Costas', img: EXERCISE_IMAGES.costas, defaultSets: 4, defaultReps: '10', defaultRest: 60 },
            { id: 'c2', name: 'Remada Baixa no Triângulo', muscle: 'Costas', img: EXERCISE_IMAGES.costas, defaultSets: 4, defaultReps: '10', defaultRest: 60 },
            { id: 'c3', name: 'Pulldown com Corda', muscle: 'Costas', img: EXERCISE_IMAGES.costas, defaultSets: 3, defaultReps: '15', defaultRest: 45 },
            { id: 'l1', name: 'Hack Squat', muscle: 'Pernas', img: EXERCISE_IMAGES.perna, defaultSets: 4, defaultReps: '10', defaultRest: 90 },
            { id: 'l2', name: 'Leg Press 45º', muscle: 'Pernas', img: EXERCISE_IMAGES.perna, defaultSets: 4, defaultReps: '12', defaultRest: 90 },
            { id: 'l3', name: 'Cadeira Extensora', muscle: 'Pernas', img: EXERCISE_IMAGES.perna, defaultSets: 4, defaultReps: '12-15', defaultRest: 45 },
            { id: 'l4', name: 'Mesa Flexora', muscle: 'Pernas', img: EXERCISE_IMAGES.perna, defaultSets: 4, defaultReps: '12-15', defaultRest: 45 },
            { id: 'l5', name: 'Cadeira Abdutora', muscle: 'Pernas', img: EXERCISE_IMAGES.perna, defaultSets: 3, defaultReps: '15', defaultRest: 45 },
            { id: 'l6', name: 'Panturrilha Máquina', muscle: 'Pernas', img: EXERCISE_IMAGES.perna, defaultSets: 4, defaultReps: '15-20', defaultRest: 45 },
            { id: 'b1', name: 'Rosca Direta no Cabo', muscle: 'Braços', img: EXERCISE_IMAGES.braco, defaultSets: 3, defaultReps: '12', defaultRest: 60 },
            { id: 'b2', name: 'Tríceps Corda no Cross', muscle: 'Braços', img: EXERCISE_IMAGES.braco, defaultSets: 3, defaultReps: '12', defaultRest: 60 },
            { id: 'b3', name: 'Desenvolvimento Máquina', muscle: 'Ombros', img: EXERCISE_IMAGES.braco, defaultSets: 4, defaultReps: '10', defaultRest: 60 },
            { id: 'b4', name: 'Elevação Lateral no Cabo', muscle: 'Ombros', img: EXERCISE_IMAGES.braco, defaultSets: 4, defaultReps: '15', defaultRest: 45 },
            { id: 'co1', name: 'Abdominal Máquina', muscle: 'Core', img: EXERCISE_IMAGES.core, defaultSets: 4, defaultReps: '20', defaultRest: 45 },
            { id: 'co2', name: 'Prancha Isométrica', muscle: 'Core', img: EXERCISE_IMAGES.core, defaultSets: 3, defaultReps: '60s', defaultRest: 30 },
            { id: 'ca1', name: 'Esteira', muscle: 'Cardio', img: EXERCISE_IMAGES.cardio, defaultSets: 1, defaultReps: '20 min', defaultRest: 0 },
            { id: 'ca2', name: 'Bicicleta Ergométrica', muscle: 'Cardio', img: EXERCISE_IMAGES.cardio, defaultSets: 1, defaultReps: '30 min', defaultRest: 0 },
            { id: 'ca3', name: 'Simulador de Escada', muscle: 'Cardio', img: EXERCISE_IMAGES.cardio, defaultSets: 1, defaultReps: '15 min', defaultRest: 0 }
        ];

        const CUSTOM_AVATARS = [
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/143.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/68.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/149.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/130.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/448.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/658.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/39.png",
            "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/65.png"
        ];

        const quotes = [
            "A disciplina é a ponte entre metas e realizações.",
            "O corpo alcança o que a mente acredita.",
            "Hidrate-se, respire fundo e faça o seu melhor hoje.",
            "A constância é mais importante que a intensidade."
        ];

        // ==========================================
        // 2. ESTADO GLOBAL DA APLICAÇÃO
        // ==========================================
        let appState = {
            currentScreen: 'welcome',
            activeTab: 'dashboard',
            onboardingStep: 1,
            quoteOfDay: quotes[Math.floor(Math.random() * quotes.length)],
            waterGlasses: 0,
            restTimer: 0,
            workoutProgress: {},
            userData: { name: '', age: '', gender: '', bodyType: '', weight: '', height: '', objectives: [], avatarUrl: CUSTOM_AVATARS[0], weightHistory: [] },
            newWeightEntry: '',
            isEditingName: false,
            editNameValue: '',
            isEditingObjectives: false,
            workoutMode: 'auto',
            customPlan: { 'Segunda': [], 'Terça': [], 'Quarta': [], 'Quinta': [], 'Sexta': [], 'Sábado': [], 'Domingo': [] },
            editingDay: null,
            showCatalog: false,
            showAvatarModal: false,
            stagedExercises: [],
            localFilter: 'Todos'
        };

        // ==========================================
        // 3. LÓGICA DO CRONÔMETRO
        // ==========================================
        let timerInterval;
        function updateTimerDisplay() {
            const display = document.getElementById('timer-display');
            if (display) display.innerText = formatTime(appState.restTimer);
        }

        function startTimer(seconds) {
            appState.restTimer = seconds;
            renderApp(); // Para exibir a bolha do timer
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (appState.restTimer <= 1) {
                    clearInterval(timerInterval);
                    appState.restTimer = 0;
                    try {
                        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                        audio.play().catch(e => console.log('Autoplay bloqueado', e));
                    } catch(e) {}
                    renderApp(); // Oculta a bolha
                } else {
                    appState.restTimer--;
                    updateTimerDisplay(); // Atualiza apenas o texto para não piscar a tela
                }
            }, 1000);
        }

        // ==========================================
        // 4. FUNÇÕES GLOBAIS DE AÇÃO (Conectadas ao HTML)
        // ==========================================
        window.setScreen = (screen) => { appState.currentScreen = screen; renderApp(); };
        window.setTab = (tab) => { appState.activeTab = tab; renderApp(); };
        window.nextOnboarding = () => { appState.onboardingStep = Math.min(appState.onboardingStep + 1, 4); renderApp(); };
        window.prevOnboarding = () => { appState.onboardingStep = Math.max(appState.onboardingStep - 1, 1); renderApp(); };
        
        window.updateUserObj = (field, value) => { 
            appState.userData[field] = value; 
            checkOnboardingValid(); 
        };
        
        window.toggleObjective = (id) => {
            const index = appState.userData.objectives.indexOf(id);
            if (index > -1) appState.userData.objectives.splice(index, 1);
            else appState.userData.objectives.push(id);
            if (appState.currentScreen === 'onboarding') checkOnboardingValid();
            renderApp();
        };

        window.setBodyType = (type) => { appState.userData.bodyType = type; checkOnboardingValid(); renderApp(); };

        function checkOnboardingValid() {
            const u = appState.userData;
            let isValid = false;
            if (appState.onboardingStep === 1) isValid = u.name && u.age && u.gender;
            if (appState.onboardingStep === 2) isValid = u.bodyType;
            if (appState.onboardingStep === 3) isValid = u.weight && u.height;
            if (appState.onboardingStep === 4) isValid = u.objectives.length > 0;
            
            const btn = document.getElementById('btn-continue');
            if (btn) {
                btn.disabled = !isValid;
                btn.className = isValid 
                    ? "w-full mt-12 bg-lime-500 text-gray-950 font-bold text-lg py-5 rounded-3xl active:scale-95 transition-transform shadow-[0_0_30px_rgba(132,204,22,0.4)]"
                    : "w-full mt-12 bg-gray-800 text-gray-500 font-bold text-lg py-5 rounded-3xl transition-transform";
            }
        }

        window.finishOnboarding = () => {
            const today = new Date().toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
            appState.userData.weightHistory = [{ date: today, weight: parseFloat(appState.userData.weight) }];
            appState.currentScreen = 'main';
            renderApp();
        };

        window.addWater = (amount) => { appState.waterGlasses = amount; renderApp(); };

        window.handleAddWeight = () => {
            if (!appState.newWeightEntry || isNaN(appState.newWeightEntry)) return;
            const today = new Date().toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
            const w = parseFloat(appState.newWeightEntry);
            const hist = appState.userData.weightHistory || [];
            const todayIndex = hist.findIndex(h => h.date === today);
            
            if (todayIndex >= 0) hist[todayIndex].weight = w;
            else hist.push({ date: today, weight: w });
            
            appState.userData.weight = w.toString();
            appState.userData.weightHistory = hist;
            appState.newWeightEntry = '';
            renderApp();
        };

        window.toggleExerciseProgress = (key, restSeconds) => {
            appState.workoutProgress[key] = !appState.workoutProgress[key];
            if (appState.workoutProgress[key]) startTimer(restSeconds || 60);
            renderApp();
        };

        window.removeExercise = (day, id) => {
            appState.customPlan[day] = appState.customPlan[day].filter(e => e.id !== id);
            renderApp();
        };

        window.openCatalog = (day) => {
            appState.editingDay = day;
            appState.showCatalog = true;
            appState.stagedExercises = [];
            renderApp();
        };

        window.toggleStaged = (exId) => {
            const ex = ALL_EXERCISES.find(e => e.id === exId);
            const exists = appState.stagedExercises.find(e => e.originalId === exId);
            
            if (exists) {
                appState.stagedExercises = appState.stagedExercises.filter(e => e.originalId !== exId);
            } else {
                appState.stagedExercises.push({ 
                    ...ex, 
                    id: 'custom-' + Date.now() + Math.floor(Math.random() * 1000), // Unique ID for plan
                    originalId: ex.id, 
                    recSets: ex.defaultSets, 
                    recReps: ex.defaultReps, 
                    recRest: ex.defaultRest 
                });
            }
            renderApp();
        };

        window.updateStagedField = (originalId, field, value) => {
            const ex = appState.stagedExercises.find(e => e.originalId === originalId);
            if (ex) ex[field] = value;
        };

        window.saveCatalog = () => {
            if (appState.stagedExercises.length > 0) {
                appState.customPlan[appState.editingDay].push(...appState.stagedExercises);
            }
            appState.showCatalog = false;
            renderApp();
        };

        window.resetProfile = () => {
            appState = {
                currentScreen: 'welcome', activeTab: 'dashboard', onboardingStep: 1, quoteOfDay: quotes[0],
                waterGlasses: 0, restTimer: 0, workoutProgress: {},
                userData: { name: '', age: '', gender: '', bodyType: '', weight: '', height: '', objectives: [], avatarUrl: CUSTOM_AVATARS[0], weightHistory: [] },
                newWeightEntry: '', isEditingName: false, editNameValue: '', isEditingObjectives: false,
                workoutMode: 'auto', customPlan: { 'Segunda': [], 'Terça': [], 'Quarta': [], 'Quinta': [], 'Sexta': [], 'Sábado': [], 'Domingo': [] },
                editingDay: null, showCatalog: false, showAvatarModal: false, stagedExercises: [], localFilter: 'Todos'
            };
            clearInterval(timerInterval);
            renderApp();
        };

        // ==========================================
        // 5. HELPERS DE RENDERIZAÇÃO
        // ==========================================
        const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

        function calculateStats() {
            const u = appState.userData;
            if (!u.weight || !u.height) return { imc: 0, idealCenter: 0 };
            const w = parseFloat(u.weight); const h = parseFloat(u.height) / 100;
            const imc = (w / (h * h)).toFixed(1);
            return { imc, idealCenter: (22 * (h * h)).toFixed(1) };
        }

        function generateAutoPlan() {
            const u = appState.userData;
            const isHyper = u.objectives.includes('hipertrofia');
            const isFatLoss = u.objectives.includes('emagrecimento');
            const mapToPlan = (exArray) => exArray.map(e => ({...e, recSets: e.defaultSets, recReps: e.defaultReps, recRest: e.defaultRest}));

            const tA = { title: 'Peito, Ombro e Tríceps', exercises: mapToPlan(ALL_EXERCISES.filter(e => ['Peito', 'Ombros'].includes(e.muscle) || e.name.includes('Tríceps')).slice(0, 4)) };
            const tB = { title: 'Costas e Bíceps', exercises: mapToPlan(ALL_EXERCISES.filter(e => e.muscle === 'Costas' || e.name.includes('Rosca')).slice(0, 4)) };
            const tC = { title: 'Pernas Completas', exercises: mapToPlan(ALL_EXERCISES.filter(e => e.muscle === 'Pernas').slice(0, 4)) };
            const tCardio = { title: 'Cardio & Core', exercises: mapToPlan(ALL_EXERCISES.filter(e => ['Cardio', 'Core'].includes(e.muscle)).slice(0, 4)) };
            const desc = { title: 'Descanso Ativo', exercises: mapToPlan([ALL_EXERCISES.find(e => e.id === 'ca2')]) };

            if (isFatLoss && !isHyper) return [
                { day: 'Segunda', ...tCardio }, { day: 'Terça', ...tC }, { day: 'Quarta', ...tCardio },
                { day: 'Quinta', ...tA }, { day: 'Sexta', ...tB }, { day: 'Sábado', ...tCardio }, { day: 'Domingo', ...desc }
            ];
            return [
                { day: 'Segunda', ...tA }, { day: 'Terça', ...tB }, { day: 'Quarta', ...tCardio },
                { day: 'Quinta', ...tC }, { day: 'Sexta', ...tA }, { day: 'Sábado', ...tB }, { day: 'Domingo', ...desc }
            ];
        }

        function getWeightChart() {
            const history = appState.userData.weightHistory;
            if (!history || history.length === 0) return '';
            const width = 300, height = 120, paddingX = 20, paddingY = 20;
            const weights = history.map(h => h.weight);
            const minWeight = Math.min(...weights) - 2;
            const maxWeight = Math.max(...weights) + 2;

            const points = history.map((h, i) => {
                const x = history.length === 1 ? width / 2 : paddingX + (i * ((width - paddingX * 2) / (history.length - 1)));
                const y = maxWeight === minWeight ? height / 2 : height - paddingY - ((h.weight - minWeight) / (maxWeight - minWeight)) * (height - paddingY * 2);
                return { x, y, date: h.date, weight: h.weight };
            });

            const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

            let svg = `<div class="w-full overflow-x-auto no-scrollbar pt-4"><svg viewBox="0 0 ${width} ${height}" class="w-full h-auto min-w-[280px]">`;
            if (history.length > 1) {
                svg += `<path d="${pathD}" fill="none" stroke="#84cc16" stroke-width="3" style="filter: drop-shadow(0 0 8px rgba(132,204,22,0.5));" />`;
            }
            points.forEach(p => {
                svg += `<circle cx="${p.x}" cy="${p.y}" r="5" fill="#111827" stroke="#84cc16" stroke-width="2" />
                        <text x="${p.x}" y="${p.y - 12}" fill="#9CA3AF" font-size="10" text-anchor="middle" font-weight="bold">${p.weight}</text>
                        <text x="${p.x}" y="${height - 2}" fill="#6B7280" font-size="9" text-anchor="middle">${p.date}</text>`;
            });
            svg += `</svg></div>`;
            return svg;
        }

        // ==========================================
        // 6. FUNÇÕES DE RENDERIZAÇÃO DAS TELAS
        // ==========================================
        function renderWelcome() {
            return `
            <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center animate-slide-in-bottom">
                <div class="w-28 h-28 bg-lime-500 rounded-[2.5rem] flex items-center justify-center mb-8 shadow-[0_0_50px_rgba(132,204,22,0.4)]">
                    <i class="ph ph-barbell text-5xl text-gray-950"></i>
                </div>
                <h1 class="text-5xl font-bold mb-4 tracking-tight">Fit<span class="text-lime-500">Family</span> <span class="text-sm align-top text-gray-500">PRO</span></h1>
                <p class="text-gray-400 mb-12 max-w-sm text-lg">A sua ferramenta definitiva de treinos e acompanhamento físico inteligente.</p>
                <button onclick="setScreen('onboarding')" class="w-full max-w-sm bg-lime-500 hover:bg-lime-600 text-gray-950 font-bold text-lg py-5 rounded-3xl transition-all shadow-[0_4px_20px_rgba(132,204,22,0.3)] flex items-center justify-center gap-2 active:scale-95">
                    Iniciar Jornada <i class="ph ph-caret-right text-2xl"></i>
                </button>
            </div>`;
        }

        function renderOnboarding() {
            const step = appState.onboardingStep;
            const u = appState.userData;

            let stepDots = '';
            for(let i=1; i<=4; i++) {
                stepDots += `<div class="h-2 rounded-full transition-all duration-500 ${i === step ? 'w-10 bg-lime-500' : 'w-2 bg-gray-800'}"></div>`;
            }

            let content = '';
            if (step === 1) {
                content = `
                    <h2 class="text-3xl font-extrabold mb-2">Seus Dados</h2>
                    <p class="text-gray-400 mb-8 text-lg">Vamos criar o seu perfil de atleta.</p>
                    <div class="space-y-6">
                        <div>
                            <label class="text-sm text-gray-400 mb-2 block font-bold uppercase tracking-wide">Nome de exibição</label>
                            <input type="text" oninput="updateUserObj('name', this.value)" value="${u.name}" class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-5 text-white text-lg focus:border-lime-500 outline-none" placeholder="Ex: João" />
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-sm text-gray-400 mb-2 block font-bold uppercase tracking-wide">Idade</label>
                                <input type="number" oninput="updateUserObj('age', this.value)" value="${u.age}" class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-5 text-white text-lg focus:border-lime-500 outline-none" placeholder="Ex: 30" />
                            </div>
                            <div>
                                <label class="text-sm text-gray-400 mb-2 block font-bold uppercase tracking-wide">Gênero</label>
                                <select onchange="updateUserObj('gender', this.value)" class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-5 text-white text-lg focus:border-lime-500 outline-none appearance-none">
                                    <option value="">Selecione</option>
                                    <option value="M" ${u.gender==='M'?'selected':''}>Masculino</option>
                                    <option value="F" ${u.gender==='F'?'selected':''}>Feminino</option>
                                    <option value="O" ${u.gender==='O'?'selected':''}>Outro</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <button id="btn-continue" disabled onclick="nextOnboarding()" class="w-full mt-12 bg-gray-800 text-gray-500 font-bold text-lg py-5 rounded-3xl transition-transform">Continuar</button>
                `;
            } else if (step === 2) {
                const types = [
                    { id: 'magro', title: 'Ectomorfo', desc: 'Dificuldade em ganhar massa e peso.' },
                    { id: 'atletico', title: 'Mesomorfo', desc: 'Facilidade em ganhar massa, naturalmente atlético.' },
                    { id: 'maior', title: 'Endomorfo', desc: 'Ganha peso facilmente, dificuldade em definir.' }
                ];
                let buttons = types.map(t => `
                    <button onclick="setBodyType('${t.id}')" class="w-full flex items-center p-5 rounded-3xl border text-left transition-all ${u.bodyType === t.id ? 'bg-lime-500/10 border-lime-500 shadow-[0_0_15px_rgba(132,204,22,0.1)]' : 'bg-gray-900 border-gray-800'}">
                        <div class="p-4 rounded-2xl mr-4 ${u.bodyType === t.id ? 'bg-lime-500 text-gray-950' : 'bg-gray-800 text-gray-400'}"><i class="ph ph-user text-2xl"></i></div>
                        <div>
                            <h3 class="font-bold text-lg ${u.bodyType === t.id ? 'text-white' : 'text-gray-200'}">${t.title}</h3>
                            <p class="text-sm text-gray-400 mt-1">${t.desc}</p>
                        </div>
                    </button>
                `).join('');

                content = `
                    <h2 class="text-3xl font-extrabold mb-2">Biotipo Atual</h2>
                    <p class="text-gray-400 mb-8 text-lg">Isso ajuda a entender seu metabolismo.</p>
                    <div class="space-y-4">${buttons}</div>
                    <button id="btn-continue" ${!u.bodyType?'disabled':''} onclick="nextOnboarding()" class="w-full mt-12 ${u.bodyType?'bg-lime-500 text-gray-950 shadow-[0_0_30px_rgba(132,204,22,0.4)] active:scale-95':'bg-gray-800 text-gray-500'} font-bold text-lg py-5 rounded-3xl transition-transform">Continuar</button>
                `;
            } else if (step === 3) {
                content = `
                    <h2 class="text-3xl font-extrabold mb-2">Indicadores</h2>
                    <p class="text-gray-400 mb-8 text-lg">Precisamos destas medidas para cálculos de saúde.</p>
                    <div class="space-y-6">
                        <div>
                            <label class="text-sm text-gray-400 mb-2 block font-bold uppercase tracking-wide">Peso Atual (kg)</label>
                            <input type="number" oninput="updateUserObj('weight', this.value)" value="${u.weight}" class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-5 text-white text-3xl font-bold focus:border-lime-500 outline-none" placeholder="0.0" />
                        </div>
                        <div>
                            <label class="text-sm text-gray-400 mb-2 block font-bold uppercase tracking-wide">Altura (cm)</label>
                            <input type="number" oninput="updateUserObj('height', this.value)" value="${u.height}" class="w-full bg-gray-900 border border-gray-800 rounded-2xl p-5 text-white text-3xl font-bold focus:border-lime-500 outline-none" placeholder="170" />
                        </div>
                    </div>
                    <button id="btn-continue" ${(u.weight&&u.height)?'':'disabled'} onclick="nextOnboarding()" class="w-full mt-12 ${(u.weight&&u.height)?'bg-lime-500 text-gray-950 shadow-[0_0_30px_rgba(132,204,22,0.4)] active:scale-95':'bg-gray-800 text-gray-500'} font-bold text-lg py-5 rounded-3xl transition-transform">Continuar</button>
                `;
            } else if (step === 4) {
                const objs = [
                    { id: 'emagrecimento', icon: 'ph-fire', title: 'Secar', desc: 'Perder gordura corporal' },
                    { id: 'hipertrofia', icon: 'ph-trend-up', title: 'Crescer', desc: 'Construir massa muscular' },
                    { id: 'condicionamento', icon: 'ph-heartbeat', title: 'Saúde', desc: 'Melhorar o fôlego' }
                ];
                let buttons = objs.map(o => {
                    const isSelected = u.objectives.includes(o.id);
                    return `
                    <button onclick="toggleObjective('${o.id}')" class="w-full flex items-center p-5 rounded-3xl border text-left transition-all ${isSelected ? 'bg-lime-500/10 border-lime-500 shadow-[0_0_15px_rgba(132,204,22,0.1)]' : 'bg-gray-900 border-gray-800'}">
                        <div class="p-4 rounded-2xl mr-4 transition-colors ${isSelected ? 'bg-lime-500 text-gray-950' : 'bg-gray-800 text-lime-500'}"><i class="ph ${o.icon} text-2xl"></i></div>
                        <div class="flex-1">
                            <h3 class="font-bold text-lg ${isSelected ? 'text-white' : 'text-gray-200'}">${o.title}</h3>
                            <p class="text-sm text-gray-400 mt-1">${o.desc}</p>
                        </div>
                        <div class="w-8 h-8 rounded-full border-[3px] flex items-center justify-center transition-all ${isSelected ? 'border-lime-500 bg-lime-500' : 'border-gray-700'}">
                            ${isSelected ? '<i class="ph ph-check text-gray-950 font-bold"></i>' : ''}
                        </div>
                    </button>`;
                }).join('');

                content = `
                    <h2 class="text-3xl font-extrabold mb-2">Foco Principal</h2>
                    <p class="text-gray-400 mb-8 text-lg">Selecione <span class="text-lime-500 font-bold">um ou mais</span> objetivos.</p>
                    <div class="space-y-4">${buttons}</div>
                    <button id="btn-continue" ${u.objectives.length>0?'':'disabled'} onclick="finishOnboarding()" class="w-full mt-12 ${u.objectives.length>0?'bg-lime-500 text-gray-950 shadow-[0_0_30px_rgba(132,204,22,0.4)] active:scale-95':'bg-gray-800 text-gray-500'} font-bold text-lg py-5 rounded-3xl transition-transform">Criar Meu Perfil PRO</button>
                `;
            }

            return `
            <div class="p-6 flex flex-col min-h-screen max-w-md mx-auto w-full animate-slide-in-right">
                <div class="flex items-center justify-between mb-8 mt-4 pt-4">
                    <button onclick="${step === 1 ? "setScreen('welcome')" : "prevOnboarding()"}" class="p-3 bg-gray-900 rounded-full hover:bg-gray-800 active:scale-90 transition-transform">
                        <i class="ph ph-caret-left text-xl"></i>
                    </button>
                    <div class="flex gap-2">${stepDots}</div>
                    <div class="w-12"></div>
                </div>
                <div class="flex-1 flex flex-col justify-center relative animate-fade-in">${content}</div>
            </div>`;
        }

        function renderDashboard() {
            const stats = calculateStats();
            const u = appState.userData;
            let pinPos = 50; 
            if (stats.imc < 15) pinPos = 5; else if (stats.imc > 35) pinPos = 95; else pinPos = ((stats.imc - 15) / (35 - 15)) * 100;

            let waterButtons = '';
            for(let i=0; i<8; i++) {
                waterButtons += `
                <button onclick="addWater(${i+1})" class="aspect-square rounded-2xl flex items-center justify-center transition-all active:scale-90 ${i < appState.waterGlasses ? 'bg-blue-500/20 border border-blue-500 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)]' : 'bg-gray-950 border border-gray-800 text-gray-600'}">
                    <i class="ph ${i < appState.waterGlasses ? 'ph-drop text-blue-500' : 'ph-drop'} text-2xl"></i>
                </button>`;
            }

            return `
            <div class="space-y-6 pb-32 max-w-xl mx-auto animate-slide-in-bottom">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-sm font-bold uppercase tracking-widest">Visão Geral</p>
                        <h1 class="text-3xl font-extrabold text-white capitalize">${u.name}</h1>
                    </div>
                    <div class="w-16 h-16 bg-gray-900 rounded-[1.5rem] flex items-center justify-center border-2 border-lime-500 overflow-hidden shadow-lg p-1">
                        <img src="${u.avatarUrl}" class="w-full h-full object-contain drop-shadow-md" />
                    </div>
                </div>

                <div class="bg-gray-900 border border-gray-800 rounded-[2rem] p-6">
                    <h3 class="font-bold text-white mb-4 flex items-center gap-2 text-lg"><i class="ph ph-trend-up text-lime-500 text-xl"></i> Evolução de Peso</h3>
                    <div class="flex gap-3 mb-2">
                        <input type="number" oninput="appState.newWeightEntry = this.value" value="${appState.newWeightEntry}" placeholder="Ex: 75.5" class="flex-1 bg-gray-950 border border-gray-800 rounded-2xl px-5 py-4 text-white text-xl font-bold focus:border-lime-500 outline-none" />
                        <button onclick="handleAddWeight()" class="bg-lime-500 text-gray-950 font-extrabold px-6 py-4 rounded-2xl active:scale-95 transition-transform flex items-center gap-2">
                            <i class="ph ph-plus text-xl"></i> <span class="hidden sm:inline">Registrar</span>
                        </button>
                    </div>
                    ${getWeightChart()}
                </div>

                <div class="bg-gray-900 border border-gray-800 rounded-[2rem] p-6">
                    <h3 class="font-bold text-white mb-6 flex items-center gap-2 text-lg"><i class="ph ph-target text-lime-500 text-xl"></i> Saúde & IMC</h3>
                    <div class="mb-10 relative">
                        <div class="flex justify-between text-[11px] text-gray-500 mb-2 font-bold uppercase tracking-widest">
                            <span>Abaixo</span><span class="text-lime-500">Normal</span><span>Sobrepeso</span>
                        </div>
                        <div class="h-4 w-full rounded-full flex overflow-hidden">
                            <div class="w-1/4 bg-blue-500/80"></div><div class="w-1/3 bg-lime-500"></div><div class="w-[41.6%] bg-red-500/80"></div>
                        </div>
                        <div class="absolute top-7 -translate-x-1/2 flex flex-col items-center transition-all duration-1000" style="left: ${pinPos}%">
                            <div class="w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-b-[10px] border-b-white mb-1"></div>
                            <div class="bg-white text-gray-950 text-sm font-extrabold px-3 py-1.5 rounded-xl shadow-xl whitespace-nowrap">IMC ${stats.imc}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-12">
                        <div class="bg-gray-950/50 rounded-3xl p-5 border border-gray-800 text-center">
                            <p class="text-xs text-gray-400 mb-1 font-bold uppercase tracking-wide">Peso Atual</p>
                            <p class="text-2xl font-black text-white">${u.weight} <span class="text-sm font-normal text-gray-500">kg</span></p>
                        </div>
                        <div class="bg-lime-500/10 rounded-3xl p-5 border border-lime-500/30 text-center">
                            <p class="text-xs text-lime-500 mb-1 font-bold uppercase tracking-wide">Peso Ideal</p>
                            <p class="text-2xl font-black text-white">${stats.idealCenter} <span class="text-sm font-normal text-lime-500/50">kg</span></p>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-900 border border-gray-800 rounded-[2rem] p-6">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="font-bold text-white flex items-center gap-2 text-lg"><i class="ph ph-drop text-blue-400 text-xl"></i> Água</h3>
                        <span class="text-base font-black text-blue-400">${appState.waterGlasses * 250}ml</span>
                    </div>
                    <div class="grid grid-cols-4 gap-3">${waterButtons}</div>
                </div>
            </div>`;
        }

        function renderWorkoutTab() {
            const isCustom = appState.workoutMode === 'custom';
            const plan = isCustom 
                ? Object.keys(appState.customPlan).map(day => ({ day, title: appState.customPlan[day].length ? 'Treino Personalizado' : 'Descanso / Livre', exercises: appState.customPlan[day] })) 
                : generateAutoPlan();

            let planHTML = plan.map((workout, wIndex) => {
                let exercisesHTML = workout.exercises.length === 0 
                    ? `<div class="text-center py-8 text-gray-500 text-sm flex flex-col items-center bg-gray-950/50 rounded-2xl">
                        <i class="ph ph-list-plus text-4xl mb-3 opacity-30"></i>
                        Nenhum exercício na ficha.<br/>Clique no botão <span class="text-lime-500 font-bold px-1">+</span> para montar.
                       </div>`
                    : workout.exercises.map((ex, eIndex) => {
                        const exKey = isCustom ? `${workout.day}-${ex.id}` : `${wIndex}-${eIndex}`;
                        const isDone = appState.workoutProgress[exKey];
                        
                        return `
                        <div class="flex items-center gap-4 p-4 rounded-3xl transition-all border ${isDone ? 'bg-lime-500/5 border-lime-500/20' : 'bg-gray-950/50 border-gray-800'}">
                            <div class="relative w-20 h-20 rounded-2xl overflow-hidden shrink-0 border border-gray-800 bg-gray-900">
                                <img src="${ex.img}" class="w-full h-full object-cover transition-all ${isDone ? 'opacity-30 grayscale' : 'opacity-90'}" />
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <div class="rounded-full p-2 backdrop-blur-md ${isDone ? 'bg-transparent' : 'bg-black/40'}">
                                        <i class="ph ${isDone ? 'ph-check-circle text-lime-500' : 'ph-play-circle text-white opacity-80'} text-2xl"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="flex-1">
                                <p class="font-bold text-lg leading-tight mb-2 ${isDone ? 'text-gray-500 line-through' : 'text-gray-100'}">${ex.name}</p>
                                <div class="flex flex-wrap gap-2">
                                    <span class="text-[11px] font-extrabold text-gray-400 bg-gray-800 px-2.5 py-1.5 rounded-lg">${ex.recSets}x ${ex.recReps}</span>
                                    <span class="text-[11px] font-extrabold text-lime-500 bg-lime-500/10 px-2.5 py-1.5 rounded-lg flex items-center gap-1"><i class="ph ph-timer"></i> ${ex.recRest}s</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                ${(isCustom && !isDone) ? `
                                <button onclick="removeExercise('${workout.day}', '${ex.id}')" class="p-2.5 text-red-400/50 hover:text-red-400 hover:bg-red-400/10 rounded-2xl transition-colors active:scale-90 bg-gray-950/50 border border-gray-800">
                                    <i class="ph ph-trash text-xl"></i>
                                </button>` : ''}
                                <button onclick="toggleExerciseProgress('${exKey}', ${ex.recRest})" class="p-1 rounded-full shrink-0 transition-all active:scale-90 ${isDone ? 'text-lime-500 scale-110' : 'text-gray-600'}">
                                    <i class="ph ${isDone ? 'ph-check-circle' : 'ph-circle'} text-[32px]"></i>
                                </button>
                            </div>
                        </div>`;
                    }).join('');

                return `
                <div class="bg-gray-900 border border-gray-800 rounded-[2rem] overflow-hidden shadow-lg">
                    <div class="bg-gradient-to-r from-gray-800 to-gray-900 p-5 border-b border-gray-800 flex justify-between items-center">
                        <div>
                            <p class="text-lime-500 text-[11px] font-bold uppercase tracking-widest mb-1">${workout.day}</p>
                            <h3 class="font-bold text-white text-xl">${workout.title}</h3>
                        </div>
                        ${isCustom ? `
                        <button onclick="openCatalog('${workout.day}')" class="w-12 h-12 bg-lime-500 text-gray-950 rounded-2xl flex items-center justify-center hover:bg-lime-400 transition-colors active:scale-90 shadow-md">
                            <i class="ph ph-plus text-2xl font-bold"></i>
                        </button>` : `
                        <div class="w-12 h-12 bg-gray-950 rounded-2xl flex items-center justify-center"><i class="ph ph-calendar text-gray-400 text-xl"></i></div>
                        `}
                    </div>
                    <div class="p-4 space-y-3">${exercisesHTML}</div>
                </div>`;
            }).join('');

            return `
            <div class="pb-32 max-w-xl mx-auto animate-slide-in-bottom">
                <h2 class="text-3xl font-extrabold text-white mb-6">Treinos</h2>
                <div class="flex p-1.5 bg-gray-900 rounded-[1.5rem] mb-8 border border-gray-800">
                    <button onclick="appState.workoutMode='auto'; renderApp()" class="flex-1 py-3 text-sm font-extrabold rounded-[1.2rem] transition-all ${!isCustom ? 'bg-gray-800 text-lime-500 shadow-md' : 'text-gray-500'}">App Sugere</button>
                    <button onclick="appState.workoutMode='custom'; renderApp()" class="flex-1 flex items-center justify-center gap-2 py-3 text-sm font-extrabold rounded-[1.2rem] transition-all ${isCustom ? 'bg-lime-500 text-gray-950 shadow-[0_0_15px_rgba(132,204,22,0.3)]' : 'text-gray-500'}">
                        <i class="ph ph-pencil-simple"></i> Meu Treino
                    </button>
                </div>
                <div class="space-y-6">${planHTML}</div>
            </div>`;
        }

        function renderProfileTab() {
            const u = appState.userData;
            
            let objsHTML = appState.isEditingObjectives ? `
                <div class="space-y-3 animate-slide-in-top">
                    ${[{ id: 'emagrecimento', title: 'Secar (Emagrecimento)' }, { id: 'hipertrofia', title: 'Crescer (Hipertrofia)' }, { id: 'condicionamento', title: 'Saúde (Condicionamento)' }]
                    .map(obj => {
                        const isSelected = u.objectives.includes(obj.id);
                        return `
                        <button onclick="toggleObjective('${obj.id}')" class="w-full flex justify-between items-center p-4 rounded-2xl border transition-colors ${isSelected ? 'bg-lime-500/10 border-lime-500 text-white font-bold' : 'bg-gray-950 border-gray-800 text-gray-400'}">
                            ${obj.title}
                            <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${isSelected ? 'border-lime-500 bg-lime-500 text-gray-950' : 'border-gray-700'}">
                                ${isSelected ? '<i class="ph ph-check font-bold"></i>' : ''}
                            </div>
                        </button>`;
                    }).join('')}
                </div>` 
            : `<div class="flex flex-wrap gap-2">${u.objectives.map(obj => `<span class="bg-lime-500/10 border border-lime-500/20 text-lime-500 px-4 py-2 rounded-xl text-sm font-bold capitalize">${obj}</span>`).join('')}</div>`;

            let nameArea = appState.isEditingName ? `
                <div class="flex items-center gap-2 mb-2">

                    <button onclick="appState.userData.name=appState.editNameValue; appState.isEditingName=false; renderApp()" class="p-2 bg-lime-500 rounded-xl text-gray-950"><i class="ph ph-check-circle text-xl"></i></button>
                </div>` 
            : `
                <h3 class="text-3xl font-black text-white capitalize flex items-center justify-center gap-3">
                    ${u.name} <button onclick="appState.editNameValue='${u.name}'; appState.isEditingName=true; renderApp()" class="text-gray-500 hover:text-lime-500 transition-colors"><i class="ph ph-pencil-simple text-xl"></i></button>
                </h3>`;

            return `
            <div class="pb-32 max-w-xl mx-auto animate-slide-in-bottom">
                <h2 class="text-3xl font-extrabold text-white mb-6">Ajustes</h2>
                
                <div class="bg-gradient-to-b from-gray-800 to-gray-900 border border-gray-800 rounded-[2rem] p-8 text-center mb-6 relative overflow-hidden">
                    <div class="w-32 h-32 bg-gray-800 rounded-[2rem] flex items-center justify-center border-4 border-lime-500 mx-auto mb-6 overflow-hidden relative z-10 shadow-2xl p-2">
                        <img src="${u.avatarUrl}" class="w-full h-full object-contain drop-shadow-md" />
                    </div>
                    <button onclick="appState.showAvatarModal=true; renderApp()" class="mx-auto mb-6 bg-gray-800 text-lime-500 text-sm font-bold px-5 py-3 rounded-full flex items-center gap-2 transition-transform active:scale-95 relative z-10 border border-gray-700 shadow-md">
                        <i class="ph ph-arrows-clockwise"></i> Escolher Ícone
                    </button>
                    <div class="relative z-10 flex flex-col items-center">
                        ${nameArea}
                        <p class="text-gray-400 text-lg mt-1">${u.age} anos • ${u.bodyType}</p>
                    </div>
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-lime-500/10 blur-[80px] rounded-full"></div>
                </div>

                <div class="space-y-4">
                    <div class="bg-gray-900 border border-gray-800 rounded-[2rem] p-6 flex flex-col gap-5">
                        <div class="flex justify-between items-center">
                            <span class="text-gray-400 font-bold uppercase tracking-widest text-xs">Focos do Protocolo</span>
                            <button onclick="appState.isEditingObjectives=!appState.isEditingObjectives; renderApp()" class="text-lime-500 text-xs font-extrabold flex items-center gap-1.5 uppercase tracking-wide bg-lime-500/10 px-3 py-1.5 rounded-lg active:scale-95">
                                <i class="ph ph-pencil-simple"></i> ${appState.isEditingObjectives ? 'Fechar' : 'Editar'}

                        </div>
                        ${objsHTML}

                    <i class="ph ph-sign-out text-xl"></i> Excluir Perfil PRO
                </button>
            </div>`;
        }

        function renderModals() {
            let html = '';

            // Timer Flutuante
            if (appState.restTimer > 0) {
                html += `
                <div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-gray-900 border border-lime-500/50 rounded-2xl p-4 shadow-2xl z-50 flex items-center justify-between animate-slide-in-bottom">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-lime-500/20 flex items-center justify-center"><i class="ph ph-timer text-lime-500 text-xl animate-pulse"></i></div>
                        <div>
                            <p class="text-xs text-gray-400 font-medium">Descanso</p>
                            <p id="timer-display" class="text-2xl font-bold text-white leading-none">${formatTime(appState.restTimer)}</p>
                        </div>
                    </div>
                    <button onclick="appState.restTimer=0; clearInterval(timerInterval); renderApp()" class="p-3 rounded-full bg-gray-800 hover:bg-gray-700 transition-colors active:scale-90"><i class="ph ph-x text-gray-400"></i></button>
                </div>`;
            }

            // Modal de Catálogo
            if (appState.showCatalog) {
                const categories = ['Todos', 'Peito', 'Costas', 'Pernas', 'Braços', 'Ombros', 'Core', 'Cardio'];
                const filtered = appState.localFilter === 'Todos' ? ALL_EXERCISES : ALL_EXERCISES.filter(e => e.muscle === appState.localFilter);
                
                let catBtns = categories.map(cat => `
                    <button onclick="appState.localFilter='${cat}'; renderApp()" class="px-5 py-2.5 rounded-full text-sm font-bold whitespace-nowrap transition-all ${appState.localFilter === cat ? 'bg-lime-500 text-gray-950 shadow-lg' : 'bg-gray-800 text-gray-400'}">${cat}</button>
                `).join('');

                let exList = filtered.map(ex => {
                    const stagedEx = appState.stagedExercises.find(e => e.originalId === ex.id);
                    const isSelected = !!stagedEx;
                    let editArea = isSelected ? `
                        <div class="p-4 bg-gray-950/50 border-t border-gray-800/50 flex gap-3 animate-slide-in-top">
                            <div class="flex-1">
                                <label class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1.5 block text-center">Séries</label>
                                <input type="number" oninput="updateStagedField('${ex.id}', 'recSets', this.value)" value="${stagedEx.recSets}" class="w-full bg-gray-800 rounded-xl py-3 text-white font-bold text-center text-lg outline-none focus:ring-1 focus:ring-lime-500" />
                            </div>
                            <div class="flex-1">
                                <label class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1.5 block text-center">Reps</label>
                                <input type="text" oninput="updateStagedField('${ex.id}', 'recReps', this.value)" value="${stagedEx.recReps}" class="w-full bg-gray-800 rounded-xl py-3 text-white font-bold text-center text-lg outline-none focus:ring-1 focus:ring-lime-500" />
                            </div>
                            <div class="flex-1">
                                <label class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1.5 flex items-center justify-center gap-1"><i class="ph ph-timer"></i> Desc</label>
                                <input type="number" oninput="updateStagedField('${ex.id}', 'recRest', this.value)" value="${stagedEx.recRest}" class="w-full bg-gray-800 rounded-xl py-3 text-white font-bold text-center text-lg outline-none focus:ring-1 focus:ring-lime-500" />
                            </div>
                        </div>` : '';

                    return `
                    <div class="bg-gray-900 rounded-3xl border transition-all duration-300 overflow-hidden ${isSelected ? 'border-lime-500 shadow-[0_0_20px_rgba(132,204,22,0.15)]' : 'border-gray-800'}">
                        <div class="flex items-center gap-4 p-4 cursor-pointer" onclick="toggleStaged('${ex.id}')">
                            <img src="${ex.img}" class="w-16 h-16 rounded-2xl object-cover transition-opacity ${isSelected ? 'opacity-100' : 'opacity-70'}" />
                            <div class="flex-1">
                                <p class="font-bold leading-tight text-lg ${isSelected ? 'text-lime-500' : 'text-white'}">${ex.name}</p>
                                <p class="text-xs text-gray-400 uppercase tracking-wider font-bold mt-1">${ex.muscle}</p>
                            </div>
                            <div class="w-8 h-8 rounded-full flex items-center justify-center border-2 transition-all ${isSelected ? 'bg-lime-500 border-lime-500 text-gray-950 scale-110' : 'border-gray-700 text-gray-500'}">
                                ${isSelected ? '<i class="ph ph-check-circle font-bold text-xl"></i>' : '<i class="ph ph-plus font-bold text-xl"></i>'}
                            </div>
                        </div>
                        ${editArea}
                    </div>`;
                }).join('');

                let saveBtn = appState.stagedExercises.length > 0 ? `
                    <div class="fixed bottom-0 left-0 w-full p-5 bg-gradient-to-t from-gray-950 via-gray-950 to-transparent animate-slide-in-bottom z-20">
                        <button onclick="saveCatalog()" class="w-full bg-lime-500 text-gray-950 font-extrabold text-lg py-5 rounded-3xl flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(132,204,22,0.4)] active:scale-95 transition-transform">
                            <i class="ph ph-sliders text-2xl"></i> Configurar e Salvar (${appState.stagedExercises.length})
                        </button>
                    </div>` : '';

                html += `
                <div class="fixed inset-0 bg-gray-950 z-[100] flex flex-col animate-slide-in-bottom">
                    <div class="p-5 pt-8 bg-gray-900 border-b border-gray-800 flex justify-between items-center shadow-md z-10">
                        <div>
                            <h3 class="font-bold text-xl text-white">Montar Ficha</h3>
                            <p class="text-sm text-lime-500 font-medium">Dia: ${appState.editingDay}</p>
                        </div>
                        <button onclick="appState.showCatalog=false; renderApp()" class="p-3 bg-gray-800 rounded-full text-gray-400 active:scale-90 transition-transform"><i class="ph ph-x text-xl"></i></button>
                    </div>
                    <div class="flex overflow-x-auto p-4 gap-2 border-b border-gray-800 bg-gray-950/90 backdrop-blur-md sticky top-[88px] z-10 no-scrollbar">${catBtns}</div>
                    <div class="flex-1 overflow-y-auto p-4 pb-32 space-y-4">${exList}</div>
                    ${saveBtn}
                </div>`;
            }

            // Modal de Avatar
            if (appState.showAvatarModal) {
                let avList = CUSTOM_AVATARS.map(url => `
                    <button onclick="appState.userData.avatarUrl='${url}'; appState.showAvatarModal=false; renderApp()" class="aspect-square rounded-[1rem] p-1.5 border-[3px] transition-all active:scale-90 ${appState.userData.avatarUrl === url ? 'border-lime-500 bg-lime-500/10 scale-105' : 'border-transparent bg-gray-800 hover:bg-gray-700'}">
                        <img src="${url}" class="w-full h-full object-contain drop-shadow-md" />
                    </button>
                `).join('');

                html += `
                <div class="fixed inset-0 bg-gray-950/90 backdrop-blur-md z-[100] flex items-center justify-center p-6 animate-fade-in">
                    <div class="bg-gray-900 border border-gray-800 rounded-[2rem] w-full max-w-sm p-6 shadow-2xl relative overflow-hidden">
                        <button onclick="appState.showAvatarModal=false; renderApp()" class="absolute top-5 right-5 p-2 bg-gray-800 rounded-full text-gray-400 active:scale-90 transition-transform z-10"><i class="ph ph-x text-xl"></i></button>
                        <h3 class="font-extrabold text-2xl text-white mb-2">Escolha seu Ícone</h3>
                        <p class="text-sm text-gray-400 mb-6">Seu parceiro de treino!</p>
                        <div class="grid grid-cols-4 gap-3 max-h-[50vh] overflow-y-auto p-1 no-scrollbar">${avList}</div>
                    </div>
                </div>`;
            }

            return html;
        }

        // ==========================================
        // 7. MOTOR PRINCIPAL DE RENDERIZAÇÃO
        // ==========================================
        function renderApp() {
            const root = document.getElementById('app');
            let content = '';

            if (appState.currentScreen === 'welcome') {
                content = renderWelcome();
            } else if (appState.currentScreen === 'onboarding') {
                content = renderOnboarding();
            } else {
                // Tela Principal (Dashboard, Treino, Perfil)
                let tabContent = '';
                if (appState.activeTab === 'dashboard') tabContent = renderDashboard();
                else if (appState.activeTab === 'workout') tabContent = renderWorkoutTab();
                else if (appState.activeTab === 'profile') tabContent = renderProfileTab();

                const nav = `
                <nav class="fixed bottom-0 w-full bg-gray-950/95 backdrop-blur-xl border-t border-gray-800 pb-safe z-40">
                    <div class="flex justify-around items-center p-3 max-w-md mx-auto">
                        <button onclick="setTab('dashboard')" class="flex flex-col items-center gap-1 transition-all duration-300 p-2 w-20 rounded-2xl ${appState.activeTab === 'dashboard' ? 'text-lime-500' : 'text-gray-500 hover:text-gray-300'}">
                            <i class="ph ${appState.activeTab === 'dashboard' ? 'ph-activity' : 'ph-activity'} text-[28px] ${appState.activeTab === 'dashboard' ? 'font-bold' : ''}"></i>
                            <span class="text-[11px] font-extrabold mt-1">Visão</span>
                        </button>
                        <button onclick="setTab('workout')" class="flex flex-col items-center gap-1 transition-all duration-300 p-2 w-20 rounded-2xl ${appState.activeTab === 'workout' ? 'text-lime-500' : 'text-gray-500 hover:text-gray-300'}">
                            <i class="ph ${appState.activeTab === 'workout' ? 'ph-barbell' : 'ph-barbell'} text-[28px] ${appState.activeTab === 'workout' ? 'font-bold' : ''}"></i>
                            <span class="text-[11px] font-extrabold mt-1">Treinos</span>
                        </button>
                        <button onclick="setTab('profile')" class="flex flex-col items-center gap-1 transition-all duration-300 p-2 w-20 rounded-2xl ${appState.activeTab === 'profile' ? 'text-lime-500' : 'text-gray-500 hover:text-gray-300'}">
                            <i class="ph ${appState.activeTab === 'profile' ? 'ph-user' : 'ph-user'} text-[28px] ${appState.activeTab === 'profile' ? 'font-bold' : ''}"></i>
                            <span class="text-[11px] font-extrabold mt-1">Perfil</span>
                        </button>
                    </div>
                </nav>`;

                content = `
                <div class="pt-safe"></div>
                <main class="flex-1 p-4 md:p-6 overflow-y-auto overflow-x-hidden">
                    ${tabContent}
                </main>
                ${renderModals()}
                ${nav}`;
            }

            // Atualiza o DOM (Apenas as partes necessárias podem ser otimizadas depois, mas o innerHTML resolve bem aqui)
            root.innerHTML = content;
        }

        // Inicializa o App
        renderApp();
    </script>
</body>
</html>
